services:
  postgres:
    image: postgres:15-alpine
    container_name: sentra_postgres_live
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_BIND_IP:-127.0.0.1}:${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_live_data:/var/lib/postgresql/data
    networks:
      - sentra_live_network

  mongo:
    image: mongo:4.4
    container_name: sentra_mongo_live
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    ports:
      - "${MONGO_BIND_IP:-127.0.0.1}:${MONGO_PORT:-27018}:27017"
    volumes:
      - mongo_live_data:/data/db
    networks:
      - sentra_live_network

  redis:
    image: redis:7-alpine
    container_name: sentra_redis_live
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6381}:6379"
    volumes:
      - redis_live_data:/data
    networks:
      - sentra_live_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sentra_rabbitmq_live
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_BIND_IP:-127.0.0.1}:${RABBITMQ_PORT:-5674}:5672"
      - "${RABBITMQ_BIND_IP:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15674}:15672"
    networks:
      - sentra_live_network

volumes:
  postgres_live_data:
  mongo_live_data:
  redis_live_data:

networks:
  sentra_live_network:
    driver: bridge
